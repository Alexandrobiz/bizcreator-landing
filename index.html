<html lang="fr">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizCreator — Créez. Publiez. Soyez trouvé.</title>
  <meta name="description" content="Vos créations apparaissent immédiatement dans le moteur BizCreator. Sans SEO, sans pub, sans attendre. 14,90€/mois tout inclus." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --indigo: #5865F2;
      --indigo-light: #818cf8;
      --indigo-pale: #a5b4fc;
      --sky: #38bdf8;
      --bg: #0a0a0f;
      --card: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    a { text-decoration: none; color: inherit; }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      padding: 1rem 1.5rem;
      background: rgba(10,10,15,0.80);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .nav-logo { font-weight: 700; font-size: 1.125rem; letter-spacing: -0.02em; }

    /* ── HERO ── */
    .hero {
      position: relative;
      padding: 8rem 1.5rem 6rem;
      max-width: 56rem;
      margin: 0 auto;
      text-align: center;
    }
    .aurora-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: aurora-drift 14s ease-in-out infinite;
    }
    .aurora-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #5865F2, #818cf8, transparent);
      top: -200px; left: -150px;
      animation-duration: 14s;
    }
    .aurora-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #38bdf8, #06b6d4, transparent);
      top: -100px; right: -100px;
      animation-duration: 18s;
      animation-delay: -5s;
    }
    .aurora-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #a855f7, #7c3aed, transparent);
      top: 100px; left: 40%;
      opacity: 0.12;
      animation-duration: 16s;
      animation-delay: -9s;
    }
    @keyframes aurora-drift {
      0%,100% { transform: translate(0,0) scale(1); }
      25%      { transform: translate(40px,-30px) scale(1.08); }
      50%      { transform: translate(-20px,40px) scale(0.95); }
      75%      { transform: translate(30px,20px) scale(1.04); }
    }
    .hero-inner { position: relative; z-index: 1; }

    .badge {
      display: inline-block;
      padding: 0.375rem 1rem;
      border-radius: 9999px;
      border: 1px solid rgba(88,101,242,0.4);
      background: rgba(88,101,242,0.1);
      color: var(--indigo-pale);
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }
    .gradient-text {
      background: linear-gradient(90deg, var(--indigo-light), var(--sky));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1.125rem, 3vw, 1.375rem);
      color: rgba(255,255,255,0.6);
      max-width: 38rem;
      margin: 0 auto 1rem;
      line-height: 1.6;
    }
    .hero-sub2 {
      font-size: 1rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 2.5rem;
    }

    .cta-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }

    .btn-primary {
      display: inline-block;
      padding: 1rem 2.5rem;
      border-radius: 9999px;
      background: linear-gradient(90deg, var(--indigo), var(--sky));
      color: #fff;
      font-weight: 700;
      font-size: 1.125rem;
      cursor: pointer;
      border: none;
      transition: transform 0.2s, box-shadow 0.3s;
    }
